name: Build and Push Docker Image

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        id: build
        run: docker build -t ghcr.io/${{ github.repository }}:latest .

      - name: Push Docker image
        id: push
        run: docker push ghcr.io/${{ github.repository }}:latest

      - name: Generate docker-compose.yaml
        run: |
          cat > docker-compose.yaml << EOL
          version: '3'
          services:
            app:
              image: ghcr.io/${{ github.repository }}:latest
              ports:
                - '8080:80'
          EOL

      - name: Commit docker-compose.yaml
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add docker-compose.yaml
          git commit -m "Add docker-compose.yaml"
          git push

      - name: Output Image URL
        run: |
          echo "IMAGE_URL=ghcr.io/${{ github.repository }}:latest" >> $GITHUB_OUTPUT
          echo "WORKFLOW_ID=${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Notify Workflow Status
        if: always()
        run: |
          echo "Workflow Status: ${{ job.status }}"
          echo "Image URL: ghcr.io/${{ github.repository }}:latest"
          echo "Workflow ID: ${{ github.run_id }}"